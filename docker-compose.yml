version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cortexgrid-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cortexgrid
      POSTGRES_PASSWORD: cortexgrid
      POSTGRES_DB: cortexgrid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortexgrid -d cortexgrid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cortexgrid-network

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cortexgrid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cortexgrid-network

  # ─── Mosquitto MQTT Broker ──────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cortexgrid-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquittodata:/mosquitto/data
      - mosquittolog:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m 'ok' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cortexgrid-network

  # ─── API (NestJS) ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cortexgrid-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://cortexgrid:cortexgrid@postgres:5432/cortexgrid?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cortexgrid-network

  # ─── Web (Next.js) ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cortexgrid-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3001
      - NEXT_PUBLIC_WS_URL=ws://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cortexgrid-network

  # ─── IoT Simulator ─────────────────────────────────────────────────────
  iot-simulator:
    build:
      context: .
      dockerfile: apps/iot-simulator/Dockerfile
    container_name: cortexgrid-iot-simulator
    restart: unless-stopped
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - cortexgrid-network

  # ─── Prometheus ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cortexgrid-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cortexgrid-network

  # ─── Grafana ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cortexgrid-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: cortexgrid
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cortexgrid.json
    volumes:
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - cortexgrid-network

  # ─── Elasticsearch ─────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: cortexgrid-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - cortexgrid-network

  # ─── Kibana ─────────────────────────────────────────────────────────────
  kibana:
    image: kibana:8.12.0
    container_name: cortexgrid-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      XPACK_SECURITY_ENABLED: "false"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - cortexgrid-network

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  mosquittodata:
    driver: local
  mosquittolog:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local
  esdata:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  cortexgrid-network:
    driver: bridge
    name: cortexgrid-network
