# CortexGrid Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ─── CortexGrid API Metrics ────────────────────────────────────────────
  - job_name: "cortexgrid-api"
    metrics_path: "/api/v1/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["api:3001"]
        labels:
          service: "cortexgrid-api"
          environment: "production"

  # ─── Prometheus Self-Monitoring ─────────────────────────────────────────
  - job_name: "prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
