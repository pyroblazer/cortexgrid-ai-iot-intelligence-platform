apiVersion: 1

providers:
  - name: CortexGrid Dashboards
    orgId: 1
    folder: CortexGrid
    folderUid: cortexgrid
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
