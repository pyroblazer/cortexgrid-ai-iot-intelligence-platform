# CortexGrid Mosquitto MQTT Broker Configuration

# ─── TCP Listener ────────────────────────────────────────────────────────
listener 1883
allow_anonymous true

# ─── WebSocket Listener ──────────────────────────────────────────────────
listener 9001
protocol websockets

# ─── Persistence ─────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ─────────────────────────────────────────────────────────────
log_dest stdout
log_type all
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ─── Connection Limits ───────────────────────────────────────────────────
max_connections -1
max_queued_messages 1000
max_keepalive 600
